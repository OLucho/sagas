version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sagas
      POSTGRES_PASSWORD: sagas
      POSTGRES_DB: sagas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagas"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: sagas
      DB_PASSWORD: sagas
      DB_NAME: sagas
      DB_SSL: "false"
      JWT_SECRET: change-me-in-production
      TOKEN_HASH_SECRET: change-me-in-production
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: "587"
      SMTP_USER: your_smtp_user
      SMTP_PASS: your_smtp_password
      SMTP_FROM: "Sagas <noreply@example.com>"
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    env_file:
      - backend/.env

volumes:
  pgdata:
